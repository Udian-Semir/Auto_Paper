name: 📄 每日论文推送

on:
  # 每天北京时间 21:00（晚上9点）触发 (UTC 13:00)
  schedule:
    - cron: "0 13 * * *"

  # 允许手动触发（方便测试）
  workflow_dispatch:
    inputs:
      days_back:
        description: "抓取最近几天的论文（默认 3，可覆盖周末空档）"
        required: false
        default: "3"

jobs:
  fetch-and-push:
    runs-on: ubuntu-latest
    permissions:
      issues: write    # 允许创建 Issue
      contents: write  # 允许提交 seen_ids.json（跨天去重记录）


    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🔧 Override days_back if manually triggered
        if: github.event_name == 'workflow_dispatch'
        run: |
          python - <<'EOF'
          import yaml, sys
          with open("config.yaml", "r") as f:
              cfg = yaml.safe_load(f)
          cfg["arxiv"]["days_back"] = int("${{ github.event.inputs.days_back }}")
          with open("config.yaml", "w") as f:
              yaml.dump(cfg, f, allow_unicode=True)
          print(f"days_back 已更新为: {cfg['arxiv']['days_back']}")
          EOF

      - name: 🚀 Run paper agent
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          RUN_MODE: github
        run: python paper_agent.py

      - name: 💾 Commit dedup record (seen_ids.json)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_ids.json
          if git diff --staged --quiet; then
            echo "去重记录无变化，跳过提交。"
          else
            git commit -m "chore: update seen_ids.json [skip ci]"
            git push
          fi

      - name: 📊 Upload data artifacts

        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paper-data-${{ github.run_id }}
          path: |
            data/
            reports/
          retention-days: 30
          if-no-files-found: ignore
